version: 2

models:
  - name: fct_sales
    columns:
      - name: invoice_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: gross_margin
        tests:
          - not_null

  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_stores
    columns:
      - name: store_id
        tests:
          - unique
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_employees
    columns:
      - name: employee_id
        tests:
          - unique
          - not_null
